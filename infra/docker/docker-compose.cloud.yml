name: savc-cloud

services:
  savc-gateway:
    image: ${SAVC_GATEWAY_IMAGE:-node:22-bookworm}
    init: true
    restart: unless-stopped
    working_dir: /workspace
    user: "0:0"
    environment:
      HOME: /home/node
      NODE_OPTIONS: ${SAVC_GATEWAY_NODE_OPTIONS:---max-old-space-size=1536}
      OPENCLAW_ROOT: ${SAVC_CONTAINER_OPENCLAW_ROOT:-/workspace/node_modules/.pnpm/node_modules/openclaw}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SAVC_CODEX_ACP_ENABLE: ${SAVC_CODEX_ACP_ENABLE:-0}
      SAVC_CODEX_ACP_AUTH_MODE: ${SAVC_CODEX_ACP_AUTH_MODE:-api-key}
      SAVC_CODEX_ACP_CWD: ${SAVC_CODEX_ACP_CWD:-/workspace}
      SAVC_CODEX_ACP_AGENT: ${SAVC_CODEX_ACP_AGENT:-codex}
      SAVC_CODEX_ACP_COMMAND: ${SAVC_CODEX_ACP_COMMAND:-codex-acp}
      SAVC_CODEX_ACP_PERMISSION_MODE: ${SAVC_CODEX_ACP_PERMISSION_MODE:-approve-all}
      SAVC_CODEX_ACP_NON_INTERACTIVE: ${SAVC_CODEX_ACP_NON_INTERACTIVE:-fail}
      SAVC_GATEWAY_CONTROL_UI_HOST_FALLBACK: ${SAVC_GATEWAY_CONTROL_UI_HOST_FALLBACK:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANYROUTER_API_KEY: ${ANYROUTER_API_KEY:-}
      WZW_API_KEY: ${WZW_API_KEY:-}
      GGBOOM_API_KEY: ${GGBOOM_API_KEY:-}
      CODE_API_KEY: ${CODE_API_KEY:-}
      LAOYOU_API_KEY: ${LAOYOU_API_KEY:-}
      VOLCES_API_KEY: ${VOLCES_API_KEY:-}
      VOLCES_BASE_URL: ${VOLCES_BASE_URL:-}
      VOLCES_MODEL: ${VOLCES_MODEL:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SILICON_EMBEDDING_API_KEY: ${SILICON_EMBEDDING_API_KEY:-}
    volumes:
      - ../../:/workspace
      - savc_openclaw_state:/home/node/.openclaw
      - ${SAVC_HOST_CODEX_HOME_DIR:-./bootstrap/empty-codex-home}:/home/node/.codex
      - ${SAVC_HOST_CODEX_AUTH_FILE:-./bootstrap/empty-codex-home/auth.json}:/home/node/.codex/auth.json:ro
      - ${OPENCLAW_HOST_CREDENTIALS_DIR:-./bootstrap/empty-credentials}:/bootstrap/openclaw-credentials:ro
    command:
      - sh
      - -lc
      - |
        set -e
        corepack enable
        mkdir -p /home/node/.openclaw
        if [ ! -f "$${OPENCLAW_ROOT}/openclaw.mjs" ]; then
          pnpm --dir /workspace install --no-frozen-lockfile --lockfile=false
        fi
        if [ -d /bootstrap/openclaw-credentials ]; then
          mkdir -p /home/node/.openclaw/credentials
          find /bootstrap/openclaw-credentials -maxdepth 1 -type f -name '*.json' \
            -exec cp -f {} /home/node/.openclaw/credentials/ \;
        fi
        bash /workspace/scripts/setup.sh
        exec node "$${OPENCLAW_ROOT}/openclaw.mjs" gateway --bind lan --port 18789
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  savc-ui:
    image: node:22-bookworm
    init: true
    restart: unless-stopped
    working_dir: /workspace
    user: "0:0"
    depends_on:
      savc-gateway:
        condition: service_healthy
    environment:
      HOME: /home/node
      NODE_OPTIONS: ${SAVC_GATEWAY_NODE_OPTIONS:---max-old-space-size=1536}
      OPENCLAW_ROOT: ${SAVC_CONTAINER_OPENCLAW_ROOT:-/workspace/node_modules/.pnpm/node_modules/openclaw}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      SAVC_GATEWAY_INTERNAL_URL: ${SAVC_GATEWAY_INTERNAL_URL:-http://savc-gateway:18789}
      VITE_SAVC_GATEWAY_URL: ${VITE_SAVC_GATEWAY_URL:-/gateway}
      VITE_SAVC_SESSION_KEY: ${VITE_SAVC_SESSION_KEY:-main}
      SAVC_REDIS_URL: ${SAVC_REDIS_URL:-}
      MYSQL_URL: ${MYSQL_URL:-}
    volumes:
      - ../../:/workspace
    command:
      - bash
      - -lc
      - |
        set -e
        corepack enable
        if [ ! -f "$${OPENCLAW_ROOT}/openclaw.mjs" ]; then
          pnpm --dir /workspace install --no-frozen-lockfile --lockfile=false
        fi
        exec pnpm --dir /workspace/packages/ui exec vite --host 0.0.0.0 --port ${SAVC_UI_PORT:-5174}
    ports:
      - "${SAVC_UI_PORT:-5174}:${SAVC_UI_PORT:-5174}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${SAVC_UI_PORT:-5174}/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  savc-proactive:
    image: node:22-bookworm
    profiles: ["automation"]
    init: true
    restart: unless-stopped
    working_dir: /workspace
    user: "0:0"
    depends_on:
      savc-gateway:
        condition: service_healthy
    environment:
      HOME: /home/node
      OPENCLAW_ROOT: ${SAVC_CONTAINER_OPENCLAW_ROOT:-/workspace/node_modules/.pnpm/node_modules/openclaw}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANYROUTER_API_KEY: ${ANYROUTER_API_KEY:-}
      WZW_API_KEY: ${WZW_API_KEY:-}
      GGBOOM_API_KEY: ${GGBOOM_API_KEY:-}
      CODE_API_KEY: ${CODE_API_KEY:-}
      LAOYOU_API_KEY: ${LAOYOU_API_KEY:-}
      VOLCES_API_KEY: ${VOLCES_API_KEY:-}
      VOLCES_BASE_URL: ${VOLCES_BASE_URL:-}
      VOLCES_MODEL: ${VOLCES_MODEL:-}
      SILICON_EMBEDDING_API_KEY: ${SILICON_EMBEDDING_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_FILE: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_FILE:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_API_KEY_FILE: ${OPENWEATHER_API_KEY_FILE:-}
      OPENWEATHER_LAT: ${OPENWEATHER_LAT:-}
      OPENWEATHER_LON: ${OPENWEATHER_LON:-}
      SAVC_GATEWAY_CONTROL_UI_HOST_FALLBACK: ${SAVC_GATEWAY_CONTROL_UI_HOST_FALLBACK:-1}
    volumes:
      - ../../:/workspace
      - savc_openclaw_state:/home/node/.openclaw
    command:
      - bash
      - -lc
      - |
        set -e
        mkdir -p /home/node/.openclaw
        corepack enable
        if [ ! -f "$${OPENCLAW_ROOT}/openclaw.mjs" ]; then
          pnpm --dir /workspace install --no-frozen-lockfile --lockfile=false
        fi
        bash /workspace/scripts/setup.sh
        exec node /workspace/scripts/runtime/proactive_daemon.mjs run \
          --repo /workspace \
          --workspace /workspace/packages/core \
          --config /workspace/config/proactive.yaml \
          --channels /workspace/config/channels.yaml
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'scripts/runtime/proactive_daemon.mjs run' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  savc_openclaw_state:
