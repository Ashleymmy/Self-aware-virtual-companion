name: savc-prod

services:
  savc-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
      args:
        OPENCLAW_DOCKER_SKIP_CHOWN: "1"
    restart: unless-stopped
    environment:
      HOME: /home/node
      OPENCLAW_ROOT: /workspace/openclaw
      SAVC_AUTODEV_ENABLE: ${SAVC_AUTODEV_ENABLE:-0}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      SAVC_CODEX_ACP_ENABLE: ${SAVC_CODEX_ACP_ENABLE:-0}
      SAVC_CODEX_ACP_CWD: ${SAVC_CODEX_ACP_CWD:-/workspace-devrepo}
      SAVC_CODEX_ACP_AGENT: ${SAVC_CODEX_ACP_AGENT:-codex}
      SAVC_CODEX_ACP_COMMAND: ${SAVC_CODEX_ACP_COMMAND:-codex-acp}
      SAVC_CODEX_ACP_PERMISSION_MODE: ${SAVC_CODEX_ACP_PERMISSION_MODE:-approve-all}
      SAVC_CODEX_ACP_NON_INTERACTIVE: ${SAVC_CODEX_ACP_NON_INTERACTIVE:-fail}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_KEY_FILE: ${ANTHROPIC_API_KEY_FILE:-}
      ANYROUTER_API_KEY: ${ANYROUTER_API_KEY:-}
      ANYROUTER_API_KEY_FILE: ${ANYROUTER_API_KEY_FILE:-}
      WZW_API_KEY: ${WZW_API_KEY:-}
      WZW_API_KEY_FILE: ${WZW_API_KEY_FILE:-}
      GGBOOM_API_KEY: ${GGBOOM_API_KEY:-}
      GGBOOM_API_KEY_FILE: ${GGBOOM_API_KEY_FILE:-}
      CODE_API_KEY: ${CODE_API_KEY:-}
      CODE_API_KEY_FILE: ${CODE_API_KEY_FILE:-}
      LAOYOU_API_KEY: ${LAOYOU_API_KEY:-}
      LAOYOU_API_KEY_FILE: ${LAOYOU_API_KEY_FILE:-}
      VOLCES_API_KEY: ${VOLCES_API_KEY:-}
      VOLCES_API_KEY_FILE: ${VOLCES_API_KEY_FILE:-}
      VOLCES_BASE_URL: ${VOLCES_BASE_URL:-}
      VOLCES_MODEL: ${VOLCES_MODEL:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN_FILE: ${DISCORD_BOT_TOKEN_FILE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-}
      SILICON_EMBEDDING_API_KEY: ${SILICON_EMBEDDING_API_KEY:-}
      SILICON_EMBEDDING_API_KEY_FILE: ${SILICON_EMBEDDING_API_KEY_FILE:-}
    volumes:
      - savc_openclaw_state:/home/node/.openclaw
      - ${SAVC_HOST_CODEX_HOME_DIR:-./bootstrap/empty-codex-home}:/home/node/.codex
      - ${SAVC_HOST_DEV_WORKSPACE_DIR:-./bootstrap/empty-workspace}:/workspace-devrepo
      - ${SAVC_HOST_SECRETS_DIR:-./secrets}:${SAVC_SECRETS_MOUNT:-/run/savc-secrets}:ro
      - ${OPENCLAW_HOST_CREDENTIALS_DIR:-./bootstrap/empty-credentials}:/bootstrap/openclaw-credentials:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  savc-ui:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.runtime
      args:
        SAVC_RUNTIME_SKIP_CHOWN: "1"
    restart: unless-stopped
    depends_on:
      savc-gateway:
        condition: service_healthy
    environment:
      HOME: /home/node
      OPENCLAW_ROOT: /workspace/openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      SAVC_GATEWAY_INTERNAL_URL: ${SAVC_GATEWAY_INTERNAL_URL:-http://savc-gateway:18789}
      VITE_SAVC_GATEWAY_URL: ${VITE_SAVC_GATEWAY_URL:-/gateway}
      VITE_SAVC_SESSION_KEY: ${VITE_SAVC_SESSION_KEY:-main}
      SAVC_REDIS_URL: ${SAVC_REDIS_URL:-}
      MYSQL_URL: ${MYSQL_URL:-}
    volumes:
      - ${SAVC_HOST_SECRETS_DIR:-./secrets}:${SAVC_SECRETS_MOUNT:-/run/savc-secrets}:ro
      - savc_runtime_data:/workspace/.runtime
      - savc_storage_data:/workspace/config/storage
    command:
      - bash
      - -lc
      - |
        exec pnpm --dir /workspace/packages/ui exec vite --host 0.0.0.0 --port ${SAVC_UI_PORT:-5174}
    ports:
      - "${SAVC_UI_PORT:-5174}:${SAVC_UI_PORT:-5174}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${SAVC_UI_PORT:-5174}/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  savc-proactive:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.runtime
      args:
        SAVC_RUNTIME_SKIP_CHOWN: "1"
    profiles: ["automation"]
    restart: unless-stopped
    depends_on:
      savc-gateway:
        condition: service_healthy
    environment:
      HOME: /home/node
      OPENCLAW_ROOT: /workspace/openclaw
      SAVC_AUTODEV_ENABLE: ${SAVC_AUTODEV_ENABLE:-0}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_KEY_FILE: ${ANTHROPIC_API_KEY_FILE:-}
      ANYROUTER_API_KEY: ${ANYROUTER_API_KEY:-}
      ANYROUTER_API_KEY_FILE: ${ANYROUTER_API_KEY_FILE:-}
      WZW_API_KEY: ${WZW_API_KEY:-}
      WZW_API_KEY_FILE: ${WZW_API_KEY_FILE:-}
      GGBOOM_API_KEY: ${GGBOOM_API_KEY:-}
      GGBOOM_API_KEY_FILE: ${GGBOOM_API_KEY_FILE:-}
      CODE_API_KEY: ${CODE_API_KEY:-}
      CODE_API_KEY_FILE: ${CODE_API_KEY_FILE:-}
      LAOYOU_API_KEY: ${LAOYOU_API_KEY:-}
      LAOYOU_API_KEY_FILE: ${LAOYOU_API_KEY_FILE:-}
      VOLCES_API_KEY: ${VOLCES_API_KEY:-}
      VOLCES_API_KEY_FILE: ${VOLCES_API_KEY_FILE:-}
      VOLCES_BASE_URL: ${VOLCES_BASE_URL:-}
      VOLCES_MODEL: ${VOLCES_MODEL:-}
      SILICON_EMBEDDING_API_KEY: ${SILICON_EMBEDDING_API_KEY:-}
      SILICON_EMBEDDING_API_KEY_FILE: ${SILICON_EMBEDDING_API_KEY_FILE:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN_FILE: ${DISCORD_BOT_TOKEN_FILE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_FILE: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_FILE:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_API_KEY_FILE: ${OPENWEATHER_API_KEY_FILE:-}
      OPENWEATHER_LAT: ${OPENWEATHER_LAT:-}
      OPENWEATHER_LON: ${OPENWEATHER_LON:-}
    volumes:
      - savc_openclaw_state:/home/node/.openclaw
      - ${SAVC_HOST_SECRETS_DIR:-./secrets}:${SAVC_SECRETS_MOUNT:-/run/savc-secrets}:ro
      - savc_runtime_data:/workspace/.runtime
      - savc_storage_data:/workspace/config/storage
    command:
      - bash
      - -lc
      - |
        mkdir -p /home/node/.openclaw
        bash /workspace/scripts/setup.sh
        exec node /workspace/scripts/runtime/proactive_daemon.mjs run \
          --repo /workspace \
          --workspace /workspace/packages/core \
          --config /workspace/config/proactive.yaml \
          --channels /workspace/config/channels.yaml
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'scripts/runtime/proactive_daemon.mjs run' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  savc_openclaw_state:
  savc_runtime_data:
  savc_storage_data:
